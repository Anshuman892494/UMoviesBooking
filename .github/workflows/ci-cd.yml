name: CI/CD Pipeline to AWS EC2

on:
  push:
    branches:
      - main
      - master # Adjust if your main branch is named differently

jobs:
  build-and-push:
    name: Build Docker Image and Push to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Replace 'your-dockerhub-username/umoviesbooking' with your actual repository name
          tags: ${{ secrets.DOCKER_USERNAME }}/umoviesbooking:latest

  deploy:
    name: Deploy to AWS EC2
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute deployment commands via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull the latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/umoviesbooking:latest
            
            # Stop and remove the existing container if it exists
            docker stop umoviesbooking-container || true
            docker rm umoviesbooking-container || true
            
            # Run the new container, exposing port 80
            docker run -d --name umoviesbooking-container -p 80:80 ${{ secrets.DOCKER_USERNAME }}/umoviesbooking:latest
            
            # Optional: Clean up old unused images to save space
            docker image prune -f
